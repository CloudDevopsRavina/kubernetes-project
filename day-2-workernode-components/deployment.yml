apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx
spec:
  replicas: 5
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: 383946777397.dkr.ecr.ap-south-1.amazonaws.com/simple-java-maven-app:3
        ports:
        - containerPort: 80 
