replicaCount: 2

image:
  repository: nginx
  tag: "1.27"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  DB_HOST: mysql
  DB_PORT: "3306"

ingress:
  enabled: true
  host: app.example.com

autoscaling:
  enabled: false

nodeSelector:
  disktype: ssd
